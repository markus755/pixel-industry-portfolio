# Netlify Configuration
# Nur als Fallback-Hosting – primäres Deployment läuft über GitHub Pages.
# Audio-Dateien sind in Git versioniert (audio/*.mp3), kein Build nötig.

[build]
  publish = "."

# Globale Security-Header
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://t.contentsquare.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Audio-Verzeichnis Headers
[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "https://www.pixel-industry.de"
