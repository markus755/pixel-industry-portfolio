# Netlify Configuration
# Nur als Fallback-Hosting – primäres Deployment läuft über GitHub Pages.
# Audio-Dateien sind in Git versioniert (audio/*.mp3), kein Build nötig.

[build]
  publish = "."

# Audio-Verzeichnis Headers
[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Netlify Functions
[functions]
  directory = "netlify/functions"
